name: Feature request
description: Suggest a new capability or enhancement for Colony.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. For large changes (new auth mode,
        protocol-level change, new platform target), please discuss before
        implementation to avoid wasted work.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or missing capability, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Colony do differently? UI change, config option, new behavior, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about + why you prefer the proposed one.

  - type: dropdown
    id: scope
    attributes:
      label: Scope estimate (your best guess)
      options:
        - Small — isolated UI tweak, setting, or doc change
        - Medium — new panel, new config surface, extra API call
        - Large — architectural change, new auth mode, new platform
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
