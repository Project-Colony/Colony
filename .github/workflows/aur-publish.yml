# Bump the colony-bin AUR package to a given release tag. Uses a dedicated SSH
# key (AUR_SSH_PRIVATE_KEY secret) registered as a secondary key on the
# MotherSphere AUR account — scope is limited to AUR push access, revocable by
# removing that key from the AUR profile if ever compromised.
#
# Invoked as a reusable workflow from release-please.yml after the release
# assets are built, uploaded and signed. It deliberately does NOT trigger on
# `release: published`: our releases are created by release-please with the
# default GITHUB_TOKEN, and GitHub suppresses workflow triggers for events
# created by that token — the old trigger never fired once (colony-bin sat at
# 0.1.4 for nine releases). workflow_dispatch remains as a manual fallback.

name: Publish colony-bin to AUR

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to publish to AUR (e.g. v0.7.0)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to republish to AUR (e.g. v0.7.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  aur:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "pkgver=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Publishing AUR bump for ${TAG} (pkgver=${TAG#v})"

      - name: Download colony-linux asset + compute sha256
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        # gh fails hard when the asset is missing — unlike the old bare curl,
        # which would happily save GitHub's 404 page and push its sha256 to
        # AUR, breaking installs for every colony-bin user.
        run: |
          gh release download "$TAG" -R "${{ github.repository }}" \
            --pattern colony-linux
          SHA256=$(sha256sum colony-linux | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Install SSH key + known_hosts
        env:
          SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/aur_bot
          chmod 600 ~/.ssh/aur_bot
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone AUR colony-bin repo
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_bot -o IdentitiesOnly=yes" \
            git clone ssh://aur@aur.archlinux.org/colony-bin.git aur-repo
          cd aur-repo
          git config user.name "Colony AUR Bot"
          git config user.email "colony-aur-bot@project-colony"

      - name: Early-exit if pkgver already matches
        id: check
        env:
          PKGVER: ${{ steps.tag.outputs.pkgver }}
        run: |
          cd aur-repo
          CURRENT=$(sed -n 's/^pkgver=//p' PKGBUILD | head -1)
          echo "AUR currently at pkgver=${CURRENT}, target=${PKGVER}"
          if [ "${CURRENT}" = "${PKGVER}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "pkgver already at ${PKGVER} — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD + .SRCINFO
        if: steps.check.outputs.changed == 'true'
        env:
          PKGVER: ${{ steps.tag.outputs.pkgver }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cd aur-repo
          # Reset pkgrel to 1 because pkgver changed — standard AUR convention.
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          # The binary hash lives in its own _binsha variable (the icon's
          # _iconsha is stable across releases and must not be touched).
          sed -i "s/^_binsha=.*/_binsha='${SHA256}'/" PKGBUILD

          # .SRCINFO mirrors the PKGBUILD metadata. We sed the three fields
          # that track pkgver (pkgver itself, noextract filename, source URL)
          # plus the single sha256sums line. Everything else is static.
          sed -i "s/^\tpkgver = .*/\tpkgver = ${PKGVER}/" .SRCINFO
          sed -i "s/^\tpkgrel = .*/\tpkgrel = 1/" .SRCINFO
          sed -i "s|noextract = colony-[^[:space:]]*|noextract = colony-${PKGVER}|" .SRCINFO
          sed -i "s|colony-[0-9.]*::https|colony-${PKGVER}::https|" .SRCINFO
          sed -i "s|download/v[0-9.]*/colony-linux|download/v${PKGVER}/colony-linux|" .SRCINFO
          # Only the FIRST sha256sums line is the binary's; the second is the
          # stable icon hash.
          sed -i "0,/^\tsha256sums = .*/s//\tsha256sums = ${SHA256}/" .SRCINFO

          echo "--- PKGBUILD diff ---"
          git --no-pager diff PKGBUILD || true
          echo "--- .SRCINFO diff ---"
          git --no-pager diff .SRCINFO || true

      - name: Commit + push to AUR
        if: steps.check.outputs.changed == 'true'
        env:
          PKGVER: ${{ steps.tag.outputs.pkgver }}
        run: |
          cd aur-repo
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes — colony-bin already at ${PKGVER}. Skipping push."
            exit 0
          fi
          git commit -m "colony-bin: auto-bump to ${PKGVER}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_bot -o IdentitiesOnly=yes" \
            git push
