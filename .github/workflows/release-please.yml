name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: rust

  build:
    name: Build ${{ matrix.asset }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: colony-linux
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: colony-windows.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: colony-macos
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: colony-macos-x86

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libdbus-1-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/colony ${{ matrix.asset }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\colony.exe ${{ matrix.asset }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ matrix.asset }}

  # Self-update verification is fail-closed: a release without .sig assets
  # bricks "Download update" for every existing install (this happened on
  # v0.7.0, which shipped unsigned because signing was a manual step). This job
  # makes the signatures part of the release itself and FAILS the release if
  # the signing secret is missing, so an unsigned release can never ship
  # silently again.
  sign:
    name: Sign release assets
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir dist
          gh release download "$TAG" --dir dist \
            --pattern colony-linux \
            --pattern colony-windows.exe \
            --pattern colony-macos \
            --pattern colony-macos-x86

      - name: Sign
        env:
          KEY: ${{ secrets.COLONY_SIGNING_KEY_PEM }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::COLONY_SIGNING_KEY_PEM secret is not set - the release would ship unsigned and self-update is fail-closed. See docs/release-signing.md."
            exit 1
          fi
          printf '%s' "$KEY" > /tmp/colony-release.pem
          chmod 600 /tmp/colony-release.pem
          COLONY_SIGNING_KEY=/tmp/colony-release.pem \
            ./scripts/sign-release.sh dist/colony-linux dist/colony-windows.exe dist/colony-macos dist/colony-macos-x86
          rm -f /tmp/colony-release.pem

      - name: Upload signatures
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/*.sig --clobber

  # Chained here (not on `release: published`) because release-please creates
  # the release with the default GITHUB_TOKEN, whose events do not trigger
  # other workflows - the standalone trigger never fired once in nine
  # releases. Running after `sign` also guarantees the assets exist before
  # the AUR job hashes them.
  aur:
    name: Publish colony-bin to AUR
    needs: [release-please, sign]
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/aur-publish.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
