# Keep the supply chain current: GitHub Actions (pinned by SHA - dependabot
# bumps the SHA and the version comment together) and Cargo dependencies.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        update-types: ["minor", "patch"]
