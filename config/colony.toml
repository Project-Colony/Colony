[scan]
# Dossiers scannés sous Windows (variables d'environnement supportées)
windows = [
  "${ProgramData}\\Microsoft\\Windows\\Start Menu\\Programs",
  "${APPDATA}\\Microsoft\\Windows\\Start Menu\\Programs",
]

# Dossiers scannés sous Linux/macOS (variables d'environnement supportées)
unix = [
  "${HOME}/.local/share/applications",
  "/usr/share/applications",
  "/usr/local/share/applications",
  "/var/lib/flatpak/exports/share/applications",
  "${HOME}/.local/share/flatpak/exports/share/applications",
  "/var/lib/snapd/desktop/applications",
]

# Dossiers qui contiennent uniquement des applications Colony (pour classer l'origine)
colony = [
  "${HOME}/.local/share/colony/applications",
]
